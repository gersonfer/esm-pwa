<!DOCTYPE html>
<html lang="pt-BR" data-theme="auto">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏁 ESM Live Viewer</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#10141a" />

  <!-- CSS EXTERNO -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header>
    <span>
      🏁 ESM Live Viewer
      <span id="track-badge"></span>
    </span>
    <span id="timer">--:--:--</span>
  </header>

  <div id="main"></div>
  <div id="dots"></div>

  <script>
    (function () {
      const $ = q => document.querySelector(q);
      let activeCardIndex = 0;
      let lastSnapshot = null;
      let restoredCarousel = false;

      // ── Domain-aware layout engine (TASK-003 / TASK-004) ─────────────────
      const MIN_CARD_WIDTH = 200; // px — minimum legible card width
      const MIN_CARD_HEIGHT = 120; // px — minimum legible card height
      const MAX_TEAMS = 15;  // hard cap supported by the layout model

      // Preferred column count from team count (analysis table)
      function computeColumns(teamCount) {
        const n = Math.min(teamCount, MAX_TEAMS);
        let preferred;
        if (n <= 1) preferred = 1;
        else if (n <= 4) preferred = 2;
        else if (n <= 9) preferred = 3;
        else if (n <= 12) preferred = 4;
        else preferred = 5;  // 13–15 teams on wide screens

        const feasible = Math.floor(window.innerWidth / MIN_CARD_WIDTH);
        return Math.max(1, Math.min(preferred, feasible, 5));
      }

      // Derived row count from team count and chosen columns
      function computeRows(teamCount, cols) {
        if (teamCount === 0) return 1;
        const rows = Math.ceil(Math.min(teamCount, MAX_TEAMS) / cols);
        // also constrain by viewport height so cards never go below min height
        const maxByHeight = Math.floor(window.innerHeight / MIN_CARD_HEIGHT);
        return Math.max(1, Math.min(rows, maxByHeight));
      }

      // Scale factor: 1.0 at 6 cells, shrinks toward 0.5 at 20 cells
      // Controls font sizes and spacing inside cards via --card-scale
      function computeCardScale(cols, rows) {
        const cells = cols * rows;
        // Anchor: 6 cells (2×3 or 3×2) = scale 1.0
        // Each doubling of cells halves scale, minimum 0.45
        const scale = Math.max(0.45, 1 / Math.sqrt(cells / 6));
        return Math.round(scale * 100) / 100;
      }

      // Apply --cols, --rows, --card-scale atomically to :root
      function applyLayout(teamCount) {
        const cols = computeColumns(teamCount);
        const rows = computeRows(teamCount, cols);
        const scale = computeCardScale(cols, rows);
        const root = document.documentElement;
        root.style.setProperty('--cols', cols);
        root.style.setProperty('--rows', rows);
        root.style.setProperty('--card-scale', scale);
      }
      // ──────────────────────────────────────────────────────────────────────

      window._goToStints = function (teamId, cardIndex) {
        if (isMobile() && cardIndex !== undefined) {
          sessionStorage.setItem('esm_active_card', cardIndex);
        }
        window.location.href = `stints.html?team=${teamId}`;
      };

      function isMobile() {
        return window.matchMedia("(pointer: coarse)").matches || window.innerWidth < 900;
      }

      function formatTime(sec) {
        if (typeof sec !== "number") return "--:--:--";
        sec = Math.max(0, sec | 0);
        const h = String(Math.floor(sec / 3600)).padStart(2, "0");
        const m = String(Math.floor((sec % 3600) / 60)).padStart(2, "0");
        const s = String(sec % 60).padStart(2, "0");
        return `${h}:${m}:${s}`;
      }

      function stars(cat) {
        const c = (cat || "").toUpperCase();
        let l = "";
        if (c === "LIGHT") l = "L";
        else if (c === "AM") l = "A";
        else if (c === "PRO-AM") l = "S";
        else if (c === "PRO") l = "P";
        return l ? `<span class="badge-letter">${l}</span>` : "";
      }

      function medals(skill) {
        const s = (skill || "").toLowerCase();
        let l = "";
        if (s === "platinum") l = "P";
        else if (s === "gold") l = "G";
        else if (s === "silver") l = "S";
        else if (s === "bronze") l = "B";
        return l ? `<span class="badge-letter">${l}</span>` : "";
      }

      function updateTrackBadge(name) {
        const badge = $("#track-badge");
        if (!name) badge.style.display = "none";
        else {
          badge.style.display = "inline-block";
          badge.textContent = name;
        }
      }

      function setTimerBorder(status) {
        const el = $("#timer");
        const s = String(status || "").toLowerCase();
        el.style.border = "";
        el.style.borderRadius = "8px";

        if (s === "running") el.style.border = "3px solid var(--ok)";
        else if (s === "paused") el.style.border = "3px solid var(--warn)";
        else if (s === "finished") el.style.border = "3px solid var(--alert)";
        else el.style.border = "3px solid var(--accent)";
      }

      function fmt(sec) {
        if (!sec || sec < 0) sec = 0;
        sec = Math.floor(sec);
        const h = String(Math.floor(sec / 3600)).padStart(2, "0");
        const m = String(Math.floor((sec % 3600) / 60)).padStart(2, "0");
        const s = String(sec % 60).padStart(2, "0");
        return `${h}:${m}:${s}`;
      }

      // === HELPER PARA O DRIVER CARD ===
      function renderDriverCard(d) {
        const total = d.stint_duration_sec || 0;
        const left = d.stint_left_sec || 0;
        const done = total - left;
        const pct = Math.max(0, Math.min(100, Math.round(100 * (done / Math.max(1, total)))));

        // Lógica de Cores do Nome (Only for active driver)
        let nameColor = "var(--text)";
        let isBlink = false;

        if (d.check_in) {
          if (left <= 0) {
            nameColor = "var(--alert)";
            if (lastSnapshot && lastSnapshot.race_status === 'running') {
              isBlink = true;
            }
          } else if (left <= 120) {
            nameColor = "var(--alert)";
          } else if (left < 300) {
            nameColor = "var(--warn)";
          } else {
            nameColor = "var(--ok)";
          }
        }

        // === LÓGICA DO POSITION TIMER ===
        let checkInHtml = "";
        if (d.position_time_sec != null) {
          const pSec = d.position_time_sec;
          let pColor = "#00ffff"; // Ciano
          if (pSec > 40) pColor = "#ffff00"; // Amarelo
          if (pSec > 50) pColor = "#ff0000"; // Vermelho

          checkInHtml = `<span class="pos-badge" style="color:${pColor}; text-shadow:0 0 5px ${pColor};">⏱ ${pSec}s</span>`;
        }

        if (d.check_in) {
          const blinkClass = isBlink ? " blink-text" : "";
          return `
            <div class="driver-row active-driver-row" style="opacity:1; min-width:0;">
              <div class="driver-name" style="display:flex; align-items:center; min-width:0;">

                <!-- ESQUERDA: NOME + BADGES -->
                <div style="
                  display:flex;
                  align-items:center;
                  gap:6px;
                  min-width:0;
                  flex:1;
                  overflow:hidden;
                  font-size:calc(var(--card-scale,1)*1.1rem);
                  font-weight:600;
                  color:var(--text);
                ">
                  <span class="driver-text">
                    ${d.display_name || d.name}
                  </span>
                  ${medals(d.skill)} ${checkInHtml}
                </div>

                <!-- DIREITA: TEMPO GRANDE -->
                <div class="${blinkClass}" style="
                  font-size:calc(var(--card-scale,1)*2.2rem);
                  font-family:monospace;
                  font-weight:bold;
                  line-height:1;
                  color:${nameColor};
                  flex-shrink:0;
                  margin-left:8px;
                ">
                  ${fmt(left)}
                </div>

              </div>
            </div>
          `;
        }
      }

      /* ===========================================================
         DESKTOP RENDER
      ============================================================ */
      function renderDesktop(data) {
        const teams = data.teams || [];

        // Apply domain-aware layout (columns, rows, font scale) before DOM rebuild
        applyLayout(teams.length);
        $("#main").innerHTML = `
      <div id="grid">
        ${teams.map((team, i) => {
          let boxHtml = "";
          if (team.is_box) {
            const elapsed = Math.floor(team.box_elapsed_sec || 0);
            const m = Math.floor(elapsed / 60).toString().padStart(2, "0");
            const s = (elapsed % 60).toString().padStart(2, "0");
            boxHtml = `<span class="badge-box">BOX ${m}:${s}</span>`;
          }

          return `
            <div class="card-desktop ${team.deck ? "deck" : ""}"
                 style="border-top: 4px solid ${team.color || "#888"}">
              <h3 style="display:flex; align-items:center; margin:0 0 .8rem 0;">
                ${team.team_name}
                ${stars(team.category)}
                ${boxHtml}
                ${team.deck ? '<span class="badge-box" style="margin-left:auto;">DECK</span>' : ''}
              </h3>
              <div class="drivers-container">
                ${[...(team.drivers || [])].sort((a, b) => (b.check_in ? 1 : 0) - (a.check_in ? 1 : 0)).map(d => renderDriverCard(d)).join("")}
              </div>
              <div style="margin-top: auto; padding-top: 8px;">
                <button class="stints-icon-btn" onclick="window._goToStints(${team.team_id}, ${i})" title="Stints">📋</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    `;
      }

      /* ===========================================================
         MOBILE RENDER
      ============================================================ */
      function renderMobile(data) {
        const teams = data.teams || [];
        const main = $("#main");
        const prevScroll = main.querySelector("#carousel")?.scrollLeft || 0;

        main.innerHTML = `
      <div id="carousel">
        ${teams.map((team, i) => {
          let boxHtml = "";
          if (team.is_box) {
            const elapsed = Math.floor(team.box_elapsed_sec || 0);
            const m = Math.floor(elapsed / 60).toString().padStart(2, "0");
            const s = (elapsed % 60).toString().padStart(2, "0");
            boxHtml = `<span class="badge-box">BOX ${m}:${s}</span>`;
          }

          return `
            <div class="carousel-card ${team.deck ? "deck" : ""}" style="border-top: 4px solid ${team.color || "#888"}">
              <h3 style="display:flex; align-items:center; margin:0 0 .8rem 0;">
                ${team.team_name}
                ${stars(team.category)}
                ${boxHtml}
                ${team.deck ? '<span class="badge-box" style="margin-left:auto;">DECK</span>' : ''}
              </h3>
              <div class="drivers-container">
                ${[...(team.drivers || [])].sort((a, b) => (b.check_in ? 1 : 0) - (a.check_in ? 1 : 0)).map(d => renderDriverCard(d)).join("")}
              </div>
              <div style="margin-top: auto; padding-top: 8px;">
                <button class="stints-icon-btn" onclick="window._goToStints(${team.team_id}, ${i})" title="Stints">📋</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    `;

        const el = $("#carousel");

        if (!restoredCarousel && teams.length > 0) {
          const savedIndex = sessionStorage.getItem('esm_active_card');
          if (savedIndex !== null) {
            const targetIndex = parseInt(savedIndex);
            setTimeout(() => {
              const cards = el.querySelectorAll(".carousel-card");
              if (cards.length > 0 && cards[targetIndex]) {
                cards[targetIndex].scrollIntoView({
                  behavior: 'auto',
                  inline: 'center'
                });
                activeCardIndex = targetIndex;
                document.querySelectorAll(".dot").forEach((d, idx) => {
                  d.classList.toggle("active", idx === activeCardIndex);
                });
                sessionStorage.removeItem('esm_active_card');
                restoredCarousel = true;
              }
            }, 80);
          } else {
            restoredCarousel = true;
          }
        } else {
          el.scrollLeft = prevScroll;
        }

        const dots = $("#dots");
        dots.innerHTML = teams.map((_, i) => `
      <div class="dot ${i === activeCardIndex ? 'active' : ''}"></div>
    `).join("");

        el.addEventListener("scroll", () => {
          const card = el.querySelector(".carousel-card");
          if (!card) return;
          const w = card.offsetWidth || 1;
          activeCardIndex = Math.round(el.scrollLeft / w);

          document.querySelectorAll(".dot").forEach((d, i) => {
            d.classList.toggle("active", i === activeCardIndex);
          });
        });
      }

      function render(data) {
        // console.log("STATUS:", data.race_status);
        lastSnapshot = data;

        window.debugSnapshot = data;

        $("#timer").textContent = formatTime(data.race_left_sec);
        setTimerBorder(data.race_status);
        updateTrackBadge(data.track_name);

        if (isMobile()) renderMobile(data);
        else renderDesktop(data);
      }

      function connect() {
        const ws = new WebSocket(`wss://esm-live.onrender.com/ws`);
        ws.onmessage = ev => {
          try {
            const data = JSON.parse(ev.data);
            if (data.type !== "hello") render(data);
          } catch (_) { }
        };
        ws.onclose = () => setTimeout(connect, 1000);
      }

      render({ race_left_sec: 0, teams: [] });
      connect();

      // ── Debounced resize handler (TASK-003 / TASK-004) ───────────────────
      // Re-applies layout on window resize without touching the render loop.
      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          if (!lastSnapshot || isMobile()) return;
          applyLayout((lastSnapshot.teams || []).length);
        }, 150);
      });
      // ──────────────────────────────────────────────────────────────────────

      // === STINTS MODAL ===
      function showModal(html) {
        const content = $("#stint-content");
        content.innerHTML = html;
        $("#stint-modal").classList.remove("hidden");
      }

      function closeModal() {
        $("#stint-modal").classList.add("hidden");
      }

      function openTeamModal(teamId) {
        const snap = lastSnapshot;
        if (!snap) return;
        const team = (snap.teams || [])[teamId];
        if (!team) return;

        const stints = (team.stint_history || []).slice().sort((a, b) => (a.started_at > b.started_at ? 1 : (a.started_at < b.started_at ? -1 : 0)));

        let html = `<h2>${team.team_name}</h2>`;
        html += `<button class="modal-close-btn" onclick="closeModal()">✕ Fechar</button>`;

        if (stints.length === 0) {
          html += `<p class="no-stints">Nenhum stint registrado.</p>`;
        } else {
          html += `<div class="stint-list">`;
          stints.forEach((s, idx) => {
            const driverName = s.driver_name || "Desconhecido";
            const duration = s.duration_sec != null ? ` • ${fmt(s.duration_sec)}` : " • ATIVO";
            html += `
          <div class="stint-row" onclick="window._openDriver(${teamId},'${driverName.replace(/'/g, "\\'")}')">
            <span class="stint-num">#${idx + 1}</span>
            <span class="stint-driver">${driverName}</span>
            <span class="stint-detail">${duration}</span>
          </div>
        `;
          });
          html += `</div>`;
        }

        showModal(html);
      }

      function openDriver(teamId, driverId) {
        const snap = lastSnapshot;
        if (!snap) return;
        const team = (snap.teams || [])[teamId];
        if (!team) return;

        const driverName = typeof driverId === "string" ? driverId : driverId;

        const stints = (team.stint_history || [])
          .filter(s => String(s.driver_id) === String(driverId) || s.driver_name === driverId)
          .slice()
          .sort((a, b) => (a.started_at > b.started_at ? 1 : (a.started_at < b.started_at ? -1 : 0)));

        let html = `<button class="modal-back-btn" onclick="window._openTeamModal(${teamId})">← Voltar</button>`;
        html += `<h2>${driverName}</h2>`;
        html += `<p class="stint-subtitle">${team.team_name}</p>`;

        if (stints.length === 0) {
          html += `<p class="no-stints">Nenhum stint para este piloto.</p>`;
        } else {
          html += `<div class="stint-list">`;
          stints.forEach((s, idx) => {
            const duration = s.duration_sec != null ? ` • ${fmt(s.duration_sec)}` : " • ATIVO";
            html += `
          <div class="stint-row stint-detail">
            <span class="stint-num">#${idx + 1}</span>
            <span class="stint-detail">${duration}</span>
          </div>
        `;
          });
          html += `</div>`;
        }

        showModal(html);
      }

      // Expose functions globally for onclick handlers
      window._openTeamModal = openTeamModal;
      window._openDriver = openDriver;
      window.closeModal = closeModal;

    })();
  </script>

  <script>
    /* === SERVICE WORKER === */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").then(reg => {

        if (reg.waiting) {
          reg.waiting.postMessage({ type: "SKIP_WAITING" });
        }

        reg.addEventListener("updatefound", () => {
          const newWorker = reg.installing;
          newWorker.addEventListener("statechange", () => {
            if (
              newWorker.state === "installed" &&
              navigator.serviceWorker.controller
            ) {
              reg.waiting?.postMessage({ type: "SKIP_WAITING" });
            }
          });
        });

        navigator.serviceWorker.addEventListener("controllerchange", () => {
          window.location.reload();
        });

      });
    }
  </script>

  <div id="stint-modal" class="hidden">
    <div class="stint-modal-content">
      <div id="stint-content"></div>
    </div>
  </div>

</body>

</html>
