<!DOCTYPE html>
<html lang="pt-BR" data-theme="auto">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>📋 ESM Live — Stints</title>
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#10141a" />
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<header>
  <span>
    <a href="index.html" class="back-link">← Race</a>
    <span id="page-title">📋 Stints</span>
    <span id="track-badge"></span>
  </span>
  <span id="timer">--:--:--</span>
</header>

<div id="stints-body">
  <p id="waiting-msg" class="no-stints">Aguardando primeiro stint…</p>
  <div id="stints-list" class="stint-list" style="display:none"></div>
</div>

<script type="module">
  import { buildStintViewModel } from "./js/view-models/stints.js";
  import { formatTime } from "./js/utils/time.js";

  (function(){
    const $ = q => document.querySelector(q);

    function updateTrackBadge(name){
      const badge = $("#track-badge");
      if (!name) { badge.style.display = "none"; return; }
      badge.style.display = "inline-block";
      badge.textContent = name;
    }

    // ── Read team_id from URL ────────────────────────────────────
    function getTeamIdFromQuery(){
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("team");
      if (raw === null) return null;
      const n = Number(raw);
      return isNaN(n) ? null : n;
    }

    // ── State ────────────────────────────────────────────────────
    const expectedTeamId = getTeamIdFromQuery();

    // ── Render (uses external ViewModel) ─────────────────────────
    function render(data){
      $("#timer").textContent = formatTime(data.race_left_sec || 0);
      updateTrackBadge(data.track_name);

      if (!data || !data.teams) return;

      const team = data.teams.find(t => t.team_id === expectedTeamId);
      if (!team) return;

      $("#page-title").textContent = `📋 ${team.team_name}`;

      const stints = buildStintViewModel(team);

      const waitingMsg = $("#waiting-msg");
      const list = $("#stints-list");

      if (stints.length === 0) {
        waitingMsg.style.display = "";
        waitingMsg.textContent = "Aguardando primeiro stint…";
        list.style.display = "none";
      } else {
        waitingMsg.style.display = "none";
        list.style.display = "";

        let html = `
          <div class="stint-header">
            <span class="stint-idx">#</span>
            <span class="stint-drv">Driver</span>
            <span class="stint-dur">Duração</span>
            <span class="stint-bal">Saldo</span>
          </div>
        `;

        stints.forEach((s, idx) => {
          const driverName = s.driver_name || "Desconhecido";
          const isActive = s._active === true;

          // Duration: always show computed/authoritative value
          const duration = s.duration_sec != null ? formatTime(s.duration_sec) : "--:--:--";

          // Balance: active stint shows live value; completed shows authoritative
          const isExhausted = s.balance_sec === 0;
          const balance = isExhausted
            ? "TERMINADO"
            : (s.balance_sec != null ? formatTime(s.balance_sec) : "—");

          const rowClass = isActive ? "stint-row stint-active" : "stint-row";
          const activeBadge = isActive ? ' <span class="active-badge">● ATIVO</span>' : "";

          html += `
            <div class="${rowClass}">
              <span class="stint-idx">#${idx + 1}</span>
              <span class="stint-drv">${driverName}${activeBadge}</span>
              <span class="stint-dur">${duration}</span>
              <span class="stint-bal ${isExhausted ? 'bal-exhausted' : ''}">${balance}</span>
            </div>
          `;
        });

        list.innerHTML = html;
      }
    }

    // ── WebSocket connection ─────────────────────────────────────
    function connect(){
      const ws = new WebSocket(`wss://esm-live.onrender.com/ws`);
      ws.onmessage = ev => {
        try {
          const data = JSON.parse(ev.data);
          if (data.type !== "hello") render(data);
        } catch(_) {}
      };
      ws.onclose = () => setTimeout(connect, 1000);
    }

    // ── Init ─────────────────────────────────────────────────────
    if (expectedTeamId === null) {
      $("#stints-body").innerHTML = `
        <p class="no-stints">team_id não informado na URL.</p>
        <p class="no-stints"><a href="index.html" style="color:var(--accent)">← Voltar</a></p>
      `;
    } else {
      connect();
      render({ race_left_sec: 0, teams: [{ team_id: expectedTeamId, team_name: "Carregando…", stint_history: [] }] });
    }

  })();
</script>

</body>
</html>
