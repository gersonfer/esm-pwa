<!DOCTYPE html>
<html lang="pt-BR" data-theme="auto">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>📋 ESM Live — Stints</title>
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#10141a" />
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<header>
  <span>
    <a href="index.html" class="back-link">← Race</a>
    <span id="page-title">📋 Stints</span>
    <span id="track-badge"></span>
  </span>
  <span id="timer">--:--:--</span>
</header>

<div id="stints-body">
  <p id="waiting-msg" class="no-stints">Aguardando primeiro stint…</p>
  <div id="stints-list" class="stint-list" style="display:none"></div>
</div>

<script>
(function(){
  const $ = q => document.querySelector(q);

  // ── Reuse formatting from index.html ─────────────────────────
  function formatTime(sec){
    if (typeof sec !== "number") return "--:--:--";
    sec = Math.max(0, sec|0);
    const h = String(Math.floor(sec/3600)).padStart(2,"0");
    const m = String(Math.floor((sec%3600)/60)).padStart(2,"0");
    const s = String(sec%60).padStart(2,"0");
    return `${h}:${m}:${s}`;
  }

  function updateTrackBadge(name){
    const badge = $("#track-badge");
    if (!name) { badge.style.display = "none"; return; }
    badge.style.display = "inline-block";
    badge.textContent = name;
  }

  // ── Read team_id from URL ────────────────────────────────────
  function getTeamIdFromQuery(){
    const params = new URLSearchParams(window.location.search);
    const raw = params.get("team");
    if (raw === null) return null;
    const n = Number(raw);
    return isNaN(n) ? null : n;
  }

  // ── State ────────────────────────────────────────────────────
  const expectedTeamId = getTeamIdFromQuery();

  // ── Render (dumb: render-only, no calculations) ──────────────
  function render(data){
    $("#timer").textContent = formatTime(data.race_left_sec || 0);
    updateTrackBadge(data.track_name);

    if (!data || !data.teams) return;

    const team = data.teams.find(t => t.team_id === expectedTeamId);
    if (!team) return;

    $("#page-title").textContent = `📋 ${team.team_name}`;

    const stints = (team.stint_history || []).slice().sort((a,b) => a.started_at - b.started_at);

    const waitingMsg = $("#waiting-msg");
    const list = $("#stints-list");

    if (stints.length === 0) {
      waitingMsg.style.display = "";
      waitingMsg.textContent = "Aguardando primeiro stint…";
      list.style.display = "none";
    } else {
      waitingMsg.style.display = "none";
      list.style.display = "";

      list.innerHTML = stints.map((s, idx) => {
        const driverName = s.driver_name || "Desconhecido";
        const duration = s.duration_sec != null ? formatTime(s.duration_sec) : "--:--:--";
        const isExhausted = s.balance_sec === 0;
        const balance = isExhausted
          ? "TERMINADO"
          : (s.balance_sec != null ? formatTime(s.balance_sec) : "—");

        return `
          <div class="stint-row stint-detail">
            <span class="stint-num">#${idx + 1}</span>
            <span class="stint-driver">${driverName}</span>
            <span class="stint-time">${duration}</span>
            <span class="stint-detail">${balance}</span>
          </div>
        `;
      }).join("");
    }
  }

  // ── WebSocket connection ─────────────────────────────────────
  function connect(){
    const ws = new WebSocket(`wss://esm-live.onrender.com/ws`);
    ws.onmessage = ev => {
      try {
        const data = JSON.parse(ev.data);
        if (data.type !== "hello") render(data);
      } catch(_) {}
    };
    ws.onclose = () => setTimeout(connect, 1000);
  }

  // ── Init ─────────────────────────────────────────────────────
  if (expectedTeamId === null) {
    $("#stints-body").innerHTML = `
      <p class="no-stints">team_id não informado na URL.</p>
      <p class="no-stints"><a href="index.html" style="color:var(--accent)">← Voltar</a></p>
    `;
  } else {
    connect();
    render({ race_left_sec: 0, teams: [{ team_id: expectedTeamId, team_name: "Carregando…", stint_history: [] }] });
  }

})();
</script>

</body>
</html>
